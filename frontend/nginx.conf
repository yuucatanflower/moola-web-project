# Docker's embedded DNS. Resolving "backend" through a variable (below)
# instead of a bare proxy_pass forces nginx to look it up per-request
# instead of once at config load, so this container starts fine even if
# the backend container isn't up yet.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # same pattern as the Vite dev server proxy in vite.config.js: keep API
    # calls same-origin from the browser's point of view so no CORS config
    # is needed between the containers.
    #
    # proxy_pass to a variable disables nginx's usual "strip the matched
    # location prefix" behavior, so $request_uri (the full original path) is
    # appended explicitly instead of relying on that -- otherwise this would
    # silently double up to /api/api/... and every request would 403.
    location /api/ {
        set $backend backend:8081;
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
