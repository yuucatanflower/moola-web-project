server.port=8081

# aiven mysql database connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# spring data jpa / hibernate settings
# this line tells spring to automatically create database tables
spring.jpa.hibernate.ddl-auto=update

# prints the sql commands to console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:REPLACE_ME_IN_ENV}
jwt.expiration=${JWT_EXPIRATION:86400000}

# a null boolean in a request body (e.g. from an incomplete Swagger UI request)
# should fall back to the field's Java default instead of 400ing with a raw
# Jackson stack trace
spring.jackson.deserialization.fail-on-null-for-primitives=false
